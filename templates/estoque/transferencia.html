{% extends 'base.html' %}

{% block title %}Transferência - Estoque{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6" x-data="transferenciaApp()">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">
            🔄 Transferência entre Locais
        </h1>
        <a href="{% url 'estoque:consulta_estoque' %}" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
            <i class="fas fa-arrow-left mr-2"></i>Voltar
        </a>
    </div>

    {% if messages %}
    <div class="mb-4">
        {% for message in messages %}
        <div class="p-4 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="bg-white rounded-lg shadow p-6">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Produto -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Produto <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="text" 
                           x-model="buscaProduto"
                           @input="buscarProdutos()"
                           placeholder="Digite o nome ou código"
                           class="w-full px-4 py-2 border rounded-lg">
                    
                    <div x-show="produtos.length > 0" 
                         class="absolute z-10 w-full mt-1 bg-white border rounded-lg shadow-lg max-h-60 overflow-y-auto">
                        <template x-for="prod in produtos">
                            <div @click="selecionarProduto(prod)" class="px-4 py-2 hover:bg-gray-100 cursor-pointer">
                                <div class="font-medium" x-text="prod.nome"></div>
                            </div>
                        </template>
                    </div>
                </div>
                <input type="hidden" name="produto_id" x-model="produtoSelecionado.id">
            </div>

            <!-- Locais -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Local Origem <span class="text-red-500">*</span>
                    </label>
                    <select name="local_origem" x-model="localOrigem" @change="buscarSaldoOrigem()" required class="w-full px-4 py-2 border rounded-lg">
                        <option value="">Selecione...</option>
                        {% for local in locais %}
                        <option value="{{ local }}">{{ local }}</option>
                        {% endfor %}
                    </select>
                    <div x-show="saldoOrigem >= 0" class="mt-1 text-sm text-gray-600">
                        Disponível: <span x-text="saldoOrigem" class="font-bold"></span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Local Destino <span class="text-red-500">*</span>
                    </label>
                    <select name="local_destino" required class="w-full px-4 py-2 border rounded-lg">
                        <option value="">Selecione...</option>
                        {% for local in locais %}
                        <option value="{{ local }}">{{ local }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Quantidade -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Quantidade <span class="text-red-500">*</span>
                </label>
                <input type="number" name="quantidade" min="0.01" step="0.01" required class="w-full px-4 py-2 border rounded-lg">
            </div>

            <!-- Motivo -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Motivo <span class="text-red-500">*</span>
                </label>
                <textarea name="motivo" rows="3" required placeholder="Ex: Reposição, organização, etc" class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>

            <!-- Botões -->
            <div class="flex gap-3">
                <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    <i class="fas fa-exchange-alt mr-2"></i>Transferir
                </button>
                <a href="{% url 'estoque:consulta_estoque' %}" class="px-6 py-3 bg-gray-300 rounded-lg">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
function transferenciaApp() {
    return {
        buscaProduto: '',
        produtos: [],
        produtoSelecionado: {},
        localOrigem: '',
        saldoOrigem: -1,
        
        buscarProdutos() {
            if (this.buscaProduto.length < 2) {
                this.produtos = [];
                return;
            }
            fetch(`/estoque/api/buscar-produto/?q=${this.buscaProduto}`)
                .then(r => r.json())
                .then(data => this.produtos = data.produtos || []);
        },
        
        selecionarProduto(prod) {
            this.produtoSelecionado = prod;
            this.buscaProduto = prod.nome;
            this.produtos = [];
            this.buscarSaldoOrigem();
        },
        
        buscarSaldoOrigem() {
            if (!this.produtoSelecionado.id || !this.localOrigem) return;
            fetch(`/estoque/api/saldo-produto/?produto_id=${this.produtoSelecionado.id}&local=${this.localOrigem}`)
                .then(r => r.json())
                .then(data => this.saldoOrigem = data.saldo || 0);
        }
    }
}
</script>
{% endblock %}
