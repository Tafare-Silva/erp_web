<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-blue-500 to-blue-700">
    <div class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">ERP Login</h1>
            
            {% if form.non_field_errors %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label for="id_username" class="block text-gray-700 font-bold mb-2">Usuário:</label>
                    <input 
                        type="text" 
                        id="id_username" 
                        name="username" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>
                
                <div>
                    <label for="id_password" class="block text-gray-700 font-bold mb-2">Senha:</label>
                    <input 
                        type="password" 
                        id="id_password" 
                        name="password" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                    >
                </div>
                
                <button 
                    type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200"
                >
                    Entrar
                </button>
            </form>
            
            <p class="text-center text-gray-600 mt-4">
                Não tem conta? <a href="/admin/" class="text-blue-600 hover:underline">Criar conta</a>
            </p>
        </div>
    </div>
</body>
</html>
