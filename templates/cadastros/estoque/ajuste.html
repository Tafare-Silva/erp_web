{% extends 'base.html' %}
{% block title %}Ajuste de Estoque{% endblock %}
{% block page_title %}📦 Ajuste de Estoque{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="flex items-center gap-3 mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <i class="fas fa-exclamation-triangle text-yellow-600"></i>
            <p class="text-sm text-yellow-800">Este ajuste define a quantidade EXATA do produto no estoque. Use com cuidado.</p>
        </div>
        <form method="post" id="form-ajuste">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Produto <span class="text-red-500">*</span></label>
                    <select name="produto" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">Selecione um produto...</option>
                        {% for p in produtos %}
                        <option value="{{ p.pk_chave }}">{{ p.nome }} (Saldo: {{ p.saldo_atual|default:"0" }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Local de Estoque</label>
                    <select name="local" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        {% for l in locais %}
                        <option value="{{ l.pk }}" {% if forloop.first %}selected{% endif %}>{{ l.local }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nova Quantidade <span class="text-red-500">*</span></label>
                    <input type="number" name="quantidade" step="0.001" required
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Motivo</label>
                    <input type="text" name="motivo" value="Ajuste manual"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="flex items-center gap-3 mt-6 pt-6 border-t">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold text-sm">
                    <i class="fas fa-save mr-2"></i>Aplicar Ajuste
                </button>
                <a href="{% url 'cadastros:produto_list' %}" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-50 text-sm">
                    Cancelar
                </a>
            </div>
        </form>

        <div id="resultado" class="hidden mt-6 p-4 rounded-lg"></div>
    </div>
</div>

<script>
document.getElementById('form-ajuste').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const produtoId = parseInt(form.produto.value);
    const data = {
        local: form.local.value,
        quantidade: parseFloat(form.quantidade.value),
        motivo: form.motivo.value,
    };

    try {
        const resp = await fetch(`/cadastros/produtos/${produtoId}/ajustar-estoque/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify(data)
        });
        const json = await resp.json();
        const div = document.getElementById('resultado');
        div.classList.remove('hidden');
        if (json.sucesso) {
            div.className = 'mt-6 p-4 rounded-lg bg-green-50 border border-green-200 text-green-800';
            div.innerHTML = `<i class="fas fa-check-circle mr-2"></i>Estoque ajustado: <strong>${json.saldo_anterior}</strong> → <strong>${json.saldo_novo}</strong>`;
        } else {
            div.className = 'mt-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-800';
            div.innerHTML = `<i class="fas fa-times-circle mr-2"></i>${json.erro || 'Erro ao ajustar'}`;
        }
    } catch(err) {
        const div = document.getElementById('resultado');
        div.classList.remove('hidden');
        div.className = 'mt-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-800';
        div.innerHTML = `<i class="fas fa-times-circle mr-2"></i>Erro: ${err.message}`;
    }
});
</script>
{% endblock %}
