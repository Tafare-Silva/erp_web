<!-- Modal de Busca de Produtos - Reutilizável -->
<div id="modalBuscaProduto" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-2xl max-w-2xl w-full mx-4 max-h-[80vh] flex flex-col">
        <!-- Cabeçalho -->
        <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center">
            <h2 class="text-xl font-bold">🔍 Buscar Produto</h2>
            <button type="button" onclick="fecharModalProduto()" class="text-white hover:bg-blue-700 rounded p-1 text-2xl">
                ✕
            </button>
        </div>

        <!-- Conteúdo -->
        <div class="p-4 overflow-y-auto flex-1">
            <!-- Campo de Busca -->
            <div class="mb-4">
                <input 
                    type="text"
                    id="produtoSearchInput"
                    class="form-control w-full text-lg"
                    placeholder="Digite para refinar a busca..."
                    autocomplete="off"
                >
            </div>

            <!-- Lista de Produtos -->
            <div id="produtosList" class="space-y-2">
                <!-- Será preenchida via JavaScript -->
            </div>
        </div>

        <!-- Rodapé -->
        <div class="bg-gray-100 p-4 rounded-b-lg flex justify-end gap-2 border-t">
            <button 
                type="button"
                onclick="fecharModalProduto()"
                class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 font-bold"
            >
                ❌ Cancelar
            </button>
        </div>
    </div>
</div>

<script>
let produtosGlobal = [];
let indexSelecionado = -1;

function abrirModalProduto(produtosIniciais, callback) {
    produtosGlobal = produtosIniciais;
    indexSelecionado = -1;
    
    const modal = document.getElementById('modalBuscaProduto');
    const input = document.getElementById('produtoSearchInput');
    const lista = document.getElementById('produtosList');
    
    // Guardar callback globalmente
    window.callbackProduto = callback;
    
    // Renderizar produtos
    renderizarProdutos(produtosGlobal);
    
    // Abrir modal
    modal.classList.remove('hidden');
    input.focus();
    input.value = '';
    
    // Evento de filtro
    input.addEventListener('input', filtrarProdutos);
    input.addEventListener('keydown', navegarComTeclado);
}

function renderizarProdutos(produtos) {
    const lista = document.getElementById('produtosList');
    
    if (produtos.length === 0) {
        lista.innerHTML = '<div class="text-center py-8 text-gray-500">❌ Nenhum produto encontrado</div>';
        return;
    }
    
    lista.innerHTML = produtos.map((produto, index) => `
        <div class="p-3 border border-gray-300 rounded-lg hover:bg-blue-50 cursor-pointer transition product-item" 
             data-index="${index}"
             onclick="selecionarProduto(${index})">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <p class="font-bold text-gray-900">${produto.nome}</p>
                    <p class="text-sm text-gray-600">
                        Ref: ${produto.referencia_fabrica || '-'}
                    </p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-green-600">
                        R$ ${parseFloat(produto.preco_venda).toFixed(2)}
                    </p>
                </div>
            </div>
        </div>
    `).join('');
}

function filtrarProdutos(e) {
    const query = e.target.value.toLowerCase();
    const produtosFiltrados = produtosGlobal.filter(p => 
        p.nome.toLowerCase().includes(query) || 
        (p.referencia_fabrica && p.referencia_fabrica.toLowerCase().includes(query))
    );
    renderizarProdutos(produtosFiltrados);
    indexSelecionado = -1;
}

function navegarComTeclado(e) {
    const items = document.querySelectorAll('.product-item');
    
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        indexSelecionado = Math.min(indexSelecionado + 1, items.length - 1);
        destaquarItem(items);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        indexSelecionado = Math.max(indexSelecionado - 1, 0);
        destaquarItem(items);
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (indexSelecionado >= 0 && indexSelecionado < items.length) {
            selecionarProduto(indexSelecionado);
        }
    }
}

function destaquarItem(items) {
    items.forEach((item, index) => {
        if (index === indexSelecionado) {
            item.classList.add('bg-blue-200');
            item.scrollIntoView({ block: 'nearest' });
        } else {
            item.classList.remove('bg-blue-200');
        }
    });
}

function selecionarProduto(index) {
    const items = document.querySelectorAll('.product-item');
    if (items[index]) {
        const produtoId = items[index].dataset.index;
        const produtosFiltrados = produtosGlobal.filter(p => {
            const query = document.getElementById('produtoSearchInput').value.toLowerCase();
            return p.nome.toLowerCase().includes(query) || 
                   (p.referencia_fabrica && p.referencia_fabrica.toLowerCase().includes(query));
        });
        
        const produtoSelecionado = produtosFiltrados[index];
        
        if (produtoSelecionado && window.callbackProduto) {
            window.callbackProduto(produtoSelecionado);
        }
        fecharModalProduto();
    }
}

function fecharModalProduto() {
    const modal = document.getElementById('modalBuscaProduto');
    modal.classList.add('hidden');
    const input = document.getElementById('produtoSearchInput');
    input.removeEventListener('input', filtrarProdutos);
    input.removeEventListener('keydown', navegarComTeclado);
    window.callbackProduto = null;
}

// Fechar modal ao clicar fora dele
document.addEventListener('click', function(event) {
    const modal = document.getElementById('modalBuscaProduto');
    if (event.target === modal) {
        fecharModalProduto();
    }
});

// Fechar com ESC
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        fecharModalProduto();
    }
});
</script>
