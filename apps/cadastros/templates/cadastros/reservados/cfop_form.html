{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-lg shadow-sm p-6">
    <div class="mb-6">
        <a href="{% url 'cadastros:cfop_list' %}" class="text-gray-600 hover:text-gray-800">
            <i class="fas fa-arrow-left mr-2"></i>Voltar
        </a>
        <h2 class="text-2xl font-bold mt-2">{{ titulo }}</h2>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Código CFOP *</label>
                {{ form.cfop }}
                <p class="mt-1 text-xs text-gray-500">4 dígitos (Ex: 5102, 6102)</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nome *</label>
                {{ form.nome }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Descrição Completa</label>
                {{ form.descricao }}
                <p class="mt-1 text-xs text-gray-500">Descrição detalhada da operação</p>
            </div>
        </div>
        <div class="flex justify-between mt-6 pt-4 border-t">
            <a href="{% url 'cadastros:cfop_list' %}" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">{{ botao_texto }}</button>
        </div>
    </form>
</div>
<style>input,select,textarea{width:100%;padding:0.5rem;border:1px solid #d1d5db;border-radius:0.5rem}</style>
{% endblock %}
