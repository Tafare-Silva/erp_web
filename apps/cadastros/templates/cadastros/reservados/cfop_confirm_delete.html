{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded shadow p-6">
    <h3 class="text-xl font-bold mb-4">Excluir CFOP</h3>
    <div class="bg-red-50 border border-red-200 rounded p-4 mb-4">
        <p class="text-red-700">Excluir CFOP <strong>{{ object.cfop }} - {{ object.nome }}</strong>?</p>
    </div>
    <form method="post">{% csrf_token %}
        <div class="flex justify-between">
            <a href="{% url 'cadastros:cfop_list' %}" class="px-4 py-2 border rounded">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded">Excluir</button>
        </div>
    </form>
</div>
{% endblock %}
