{% extends 'base.html' %}
{% block title %}Excluir - ERP Web{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <div class="flex">
                <i class="fas fa-exclamation-triangle text-red-600 text-2xl mr-4"></i>
                <div>
                    <h4 class="text-red-900 font-medium mb-2">Atenção!</h4>
                    <p class="text-red-700 text-sm">Excluir tipo de pagamento <strong>"{{ object.nome }}"</strong>?</p>
                </div>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-between">
                <a href="{% url 'cadastros:tipo_pagamento_list' %}" class="px-4 py-2 border rounded-lg">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg">Sim, Excluir</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
