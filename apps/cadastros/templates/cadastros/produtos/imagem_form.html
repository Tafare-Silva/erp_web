{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded shadow p-6">
    <h2 class="text-2xl font-bold mb-4">Upload de Imagem</h2>
    <p class="text-gray-600 mb-4">Produto: <strong>{{ produto.nome }}</strong></p>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block mb-2 font-medium">Selecione a Imagem</label>
            <input type="file" name="imagem" accept="image/*" required
                   class="w-full px-4 py-2 border rounded">
            <p class="text-xs text-gray-500 mt-1">Formatos aceitos: JPG, PNG, GIF</p>
        </div>
        
        <div class="flex justify-between">
            <a href="{% url 'cadastros:imagem_list' produto.pk_chave %}" 
               class="px-4 py-2 border rounded">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded">
                <i class="fas fa-upload mr-2"></i>Enviar
            </button>
        </div>
    </form>
</div>
{% endblock %}
