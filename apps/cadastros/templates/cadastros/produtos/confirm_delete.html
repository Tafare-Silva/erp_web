{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <div class="text-center mb-6">
            <i class="fas fa-exclamation-triangle text-4xl text-yellow-500 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Confirmar Exclusão</h2>
            <p class="text-gray-600">Tem certeza que deseja excluir o produto "<strong>{{ object.nome }}</strong>"? Esta ação não pode ser desfeita.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <a href="{% url 'cadastros:produto_list' %}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">Cancelar</a>
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg">Excluir</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
