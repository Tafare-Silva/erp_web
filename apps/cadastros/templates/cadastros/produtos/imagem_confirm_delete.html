{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded shadow p-6">
    <h3 class="text-xl font-bold mb-4">Excluir Imagem</h3>
    <p class="mb-4">Excluir imagem <strong>#{{ pk_imagem }}</strong> do produto <strong>{{ produto.nome }}</strong>?</p>
    <form method="post">{% csrf_token %}
        <div class="flex justify-between">
            <a href="{% url 'cadastros:imagem_list' produto.pk_chave %}" 
               class="px-4 py-2 border rounded">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded">
                <i class="fas fa-trash mr-2"></i>Excluir
            </button>
        </div>
    </form>
</div>
{% endblock %}
