{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded shadow p-6">
    <h2 class="text-2xl font-bold mb-4">Adicionar Código de Barras</h2>
    <p class="text-gray-600 mb-4">Produto: <strong>{{ produto.nome }}</strong></p>
    <form method="post">{% csrf_token %}
        <div class="mb-4">
            <label class="block mb-2 font-medium">Código de Barras (EAN-13)</label>
            <input type="text" name="codigo_barras" maxlength="13" 
                   class="w-full px-4 py-2 border rounded" 
                   placeholder="Digite o código de barras"
                   required>
        </div>
        <div class="flex justify-between">
            <a href="{% url 'cadastros:codigo_barras_list' produto.pk_chave %}" class="px-4 py-2 border rounded">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded">Adicionar</button>
        </div>
    </form>
</div>
{% endblock %}
